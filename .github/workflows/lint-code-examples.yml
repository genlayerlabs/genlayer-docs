name: Lint Code Examples

on:
  pull_request:
    paths:
      - 'pages/**/*.mdx'
      - 'scripts/lint-code-examples.py'
  push:
    branches: [main]
    paths:
      - 'pages/**/*.mdx'
      - 'scripts/lint-code-examples.py'

jobs:
  lint-code-examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install genvm-linter
      - run: python scripts/lint-code-examples.py
